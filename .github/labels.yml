# Declarative label taxonomy for the Splotch issue tracker.
# Synced to GitHub by .github/workflows/label-sync.yml (crazy-max/ghaction-github-labeler).
# Edit here, not in the GitHub UI, so the label set stays reviewable and reproducible.
# The glossary (what each label means, and the triage flow) lives in docs/ISSUE-WORKFLOW.md.

# --- type: what kind of work (exactly one per issue) ---
- name: "type:feature"
  color: "1d76db"
  description: "New user-facing capability"
- name: "type:bug"
  color: "d73a4a"
  description: "Something isn't working as intended"
- name: "type:chore"
  color: "c2e0c6"
  description: "Tooling, build, deps, refactor — no user-facing feature"
- name: "type:test"
  color: "bfd4f2"
  description: "Test coverage or CI test infrastructure"
- name: "type:perf"
  color: "fbca04"
  description: "Performance / responsiveness"
- name: "type:security"
  color: "b60205"
  description: "Access, admin, privacy, or security hardening"
- name: "type:docs"
  color: "0075ca"
  description: "Documentation"

# --- area: which part of the product (one or more per issue) ---
- name: "area:drawing"
  color: "5319e7"
  description: "Canvas, brushes, tools, drawing engine"
- name: "area:ai-art"
  color: "8250df"
  description: "AI image generation, styles, prompts"
- name: "area:coloring-book"
  color: "6f42c1"
  description: "Coloring-book pages, packs, and workflow"
- name: "area:dark-mode"
  color: "24292f"
  description: "Dark-mode theming and assets"
- name: "area:ux"
  color: "d4c5f9"
  description: "Layout, polish, responsiveness"
- name: "area:parent-center"
  color: "0052cc"
  description: "Parent Center settings and controls"
- name: "area:admin-security"
  color: "a63b72"
  description: "Admin console, access codes, quotas, ops"
- name: "area:native"
  color: "006b75"
  description: "Android / iOS / Capacitor"
- name: "area:ci-testing"
  color: "168f6c"
  description: "CI pipeline and test infrastructure"
- name: "area:release"
  color: "9e6a03"
  description: "Release and deployment automation"
- name: "area:infra"
  color: "5a6570"
  description: "Dev tooling, dependencies, repo infrastructure"
- name: "area:asset-gen"
  color: "e99695"
  description: "Asset-generation image pipeline (tools/asset-gen)"

# --- priority: triage signal (optional, at most one) ---
- name: "priority:high"
  color: "b60205"
  description: "Do soon"
- name: "priority:medium"
  color: "fbca04"
  description: "Normal priority"
- name: "priority:low"
  color: "0e8a16"
  description: "Nice to have, no rush"

# --- meta: workflow signals ---
- name: "reviewed"
  color: "1f883d"
  description: "Review pass complete — ready for the project ToDo queue"
- name: "user-report"
  color: "0e8a16"
  description: "Filed from the in-app Report form (Parent Center → About)"
- name: "needs-scoping"
  color: "fef2c0"
  description: "Rough spec — investigate and firm up (often an ADR) before significant work"
- name: "needs-adr"
  color: "d876e3"
  description: "Needs an architectural decision record before or alongside implementation"
- name: "wont-do"
  color: "e4e669"
  description: "Considered and declined — close as not planned"
- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"

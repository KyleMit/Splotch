# Runtime smoke test for the Android *deployment*: build the app the way it
# ships, boot a real emulator, install + launch it, and assert via Maestro that
# the UI actually renders (the Capacitor WebView booted and loaded the production
# web bundle). The web E2E suite (test.yml) can't catch native/WebView boot
# failures — this can.
#
# Tag-only by design: an emulator job is the heaviest thing in CI, so it runs
# only when a release tag is pushed (the moment a crash would reach users), plus
# on demand from the Actions tab. It is deliberately NOT on every push/PR.
name: Android Deploy Smoke

on:
  push:
    tags: ['v*']
  workflow_dispatch: # allow ad-hoc runs from the GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    name: Maestro launch smoke test
    # Ubuntu + KVM is the most reliable path for Android emulators in CI.
    # macOS ARM runners (macos-latest → macos-15-arm64) hit an HVF init failure
    # with emulator 36.x ("HVF error: HV_UNSUPPORTED"), so the emulator never
    # boots. Ubuntu KVM + x86_64 is cheaper, faster, and battle-tested.
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Capacitor 8 needs a JDK 21 toolchain (the bundled JBR 17 / java 17 fails
      # AGP's JdkImageTransform). See the android-build-toolchain notes.
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install dependencies
        run: npm ci

      # Build the *debug* APK: it's auto-signed with the debug key (installable
      # with no production secrets) and `cap:sync` still bakes the production web
      # bundle, so the WebView boot path under test is the real one. (`adb install`
      # takes an APK — never the .aab, which the original sample got wrong.)
      - name: Build debug APK
        run: |
          npm run cap:sync
          cd android
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run smoke test on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb install -r -t android/app/build/outputs/apk/debug/app-debug.apk
            # :device runs Maestro against the emulator this action already booted.
            # (Plain `test:android` boots + tears down its own emulator — for local use.)
            npm run test:android:device

      - name: Upload Maestro report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: maestro-report
          path: ~/.maestro/tests/
          retention-days: 7
          if-no-files-found: ignore

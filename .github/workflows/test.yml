name: Tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fast-fail the cheapest, most-common failure first: a formatting-only
      # red PR should not wait through svelte-check + eslint to surface.
      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint

      # Drift guard: fails if any shipped SVG under web/ isn't SVGO-optimized
      # (a new icon landed un-optimized). Fix with `npm run img:audit`.
      - name: SVG audit
        run: npm run img:audit:check

      # Drift guard: every CLAUDE.md/AGENTS.md and the .claude/skills/ +
      # .agents/skills/ trees are generated from .ruler/ (ADR-0058). Fails if a
      # .ruler edit wasn't applied or a generated file was edited directly.
      # Fix with `npm run ruler:apply` and commit.
      - name: Agent-file drift
        run: npm run ruler:check

      # Drift guard: web/src/tokens.css is generated from the design-token
      # source of truth in web/src/lib/design/tokens.ts (ADR-0071). Fails if a
      # tokens.ts edit wasn't applied or the generated CSS was edited directly.
      # Fix with `npm run gen:tokens` and commit.
      - name: Design-token drift
        run: npm run gen:tokens:check

      # Raw-hex ratchet: component <style> blocks must use the design tokens
      # (ADR-0071); the per-file allowlist of documented one-offs lives in
      # scripts/lint-token-styles.mjs. Fails on any new raw hex color.
      - name: Raw-hex token lint
        run: npm run lint:tokens

      # Asset byte-stability guard: fails if any committed art asset (coloring
      # pages, style covers, fill-src raws) changed without regenerating
      # tools/asset-gen/golden/asset-manifest.sha256 — turns silent binary churn
      # into a reviewable text diff. Guards the invariant that a night-only fill
      # pass leaves light-mode bytes untouched. Fix with `npm run gen:assets:manifest`.
      - name: Asset manifest check
        run: npm run check:assets:manifest

      # Drift guard: every scrapbook/ collection dir must resolve to at least one
      # linked entry page, so the index's "N collections" count always matches the
      # cards it renders (md-only collections included, ADR-0059). Fix by adding an
      # entry page/report or removing the empty dir.
      - name: Scrapbook index check
        run: npm run scrapbook:check

      # Build-time/transitive advisories are mostly unfixable; CI only
      # hard-fails on critical severities so the gate stays meaningful, not noisy.
      - name: Audit dependencies
        run: npm audit --audit-level=critical

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Run asset-pipeline tests
        run: npm run test:asset-gen

      - name: Resolve Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          # "-webkit" marks the cache generation that includes the WebKit
          # binary — an older chromium-only cache would silently skip the
          # WebKit smoke project (playwright.config.ts drops it when the
          # binary is absent).
          key: playwright-${{ runner.os }}-webkit-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium webkit

      # The browser binaries cache, but the apt packages don't — install-deps
      # is still required on a cache hit.
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium webkit

      - name: Run e2e tests
        run: npm run test:e2e
        env:
          # Assert (not just assume) the WebKit smoke project is in the run —
          # playwright.config.ts throws if the binary is missing, so a bad
          # cache or edited install line fails loudly instead of silently
          # dropping WebKit coverage.
          REQUIRE_WEBKIT: 1
          # The generate-image rate-limit spec drives the managed-token path,
          # which requires the token to be allowlisted. Locally this comes from
          # .env (git-ignored); supply the same non-secret test tokens in CI.
          # The burst spec picks a token by testInfo.retry so each CI retry
          # (retries: 2) gets a fresh 60s limiter window — hence one per attempt.
          ALLOWED_TOKENS_LIST: daycare-club,daycare-club-retry1,daycare-club-retry2

      # The gen:* generators drive the live app through scripts/lib/app-driver.mjs
      # and never run elsewhere in CI, so this smoke keeps that module from rotting
      # silently on selector/import changes. Reuses the chromium installed above.
      - name: App-driver smoke
        run: npm run test:driver:smoke

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

name: Tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Ruler drift check
        run: npm run ruler:check

      # Drift guard: fails if any shipped SVG under web/ isn't SVGO-optimized
      # (a new icon landed un-optimized). Fix with `npm run img:audit`.
      - name: SVG audit
        run: npm run img:audit:check

      # Build-time/transitive advisories are mostly unfixable; CI only
      # hard-fails on critical severities so the gate stays meaningful, not noisy.
      - name: Audit dependencies
        run: npm audit --audit-level=critical

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Resolve Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # The browser binaries cache, but the apt packages don't — install-deps
      # is still required on a cache hit.
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e
        env:
          # The generate-image rate-limit spec drives the managed-token path,
          # which requires the token to be allowlisted. Locally this comes from
          # .env (git-ignored); supply the same non-secret test tokens in CI.
          # The burst spec picks a token by testInfo.retry so each CI retry
          # (retries: 2) gets a fresh 60s limiter window — hence one per attempt.
          ALLOWED_TOKENS_LIST: daycare-club,daycare-club-retry1,daycare-club-retry2

      # The gen:* generators drive the live app through scripts/lib/app-driver.mjs
      # and never run elsewhere in CI, so this smoke keeps that module from rotting
      # silently on selector/import changes. Reuses the chromium installed above.
      - name: App-driver smoke
        run: npm run test:driver:smoke

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

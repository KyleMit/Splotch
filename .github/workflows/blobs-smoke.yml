# Verifies that Netlify Blobs is actually live on a deployed function — the
# failure mode from ADR-0025, where a V1 function never gets the Blobs context,
# getStore() throws, and token storage silently degrades to the in-memory
# fallback. scripts/blobs-smoke.mjs round-trips a token through the live deploy
# and asserts the snapshot's `persistent` flag is true.
#
# Runs automatically on every successful Netlify deploy (preview catches a
# regression before merge; production guards the live site), and can be run
# manually against any URL from the Actions tab.
#
# Requires a repo secret ADMIN_ACCESS_TOKEN matching the deploy's admin secret;
# it only travels in the login POST body over https. The token add/remove is
# self-cleaning, so the shared store is left untouched.
name: Blobs Smoke

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      url:
        description: Deploy URL to smoke (preview or production)
        required: true

jobs:
  smoke:
    name: Netlify Blobs persistence
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' &&
       github.event.deployment_status.environment_url != '')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Round-trip a token through Blobs on the live deploy
        env:
          BLOBS_SMOKE_URL: ${{ github.event.inputs.url || github.event.deployment_status.environment_url }}
          ADMIN_ACCESS_TOKEN: ${{ secrets.ADMIN_ACCESS_TOKEN }}
        run: npm run test:blobs:smoke

# Deployment smoke test (Maestro), shared by Android and iOS. Proves the
# shipped app actually boots: the Capacitor WebView starts AND the production
# web bundle renders — not a white screen or a crash. "Parent Center" is the
# accessibility label of the always-present help button
# (src/lib/components/ParentCenter.svelte), so seeing it means real UI painted,
# not just that the process launched.
#
# Self-contained runs (boot device, build, install, test, tear down):
#   npm run test:android    # headless Android emulator
#   npm run test:ios        # iOS simulator (macOS-only)
# Or ad-hoc against an app already installed on a running emulator/simulator:
#   npm run test:android:device
appId: art.splotch.app
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: 'Parent Center'
    timeout: 30000
- takeScreenshot: smoke-launch

# Deployment smoke test (Maestro), shared by Android and iOS. Proves the
# shipped app actually boots: the Capacitor WebView starts AND the production
# web bundle renders — not a white screen or a crash. "Parent Center" is the
# accessibility label of the always-present help button
# (src/lib/components/ParentCenter.svelte), so seeing it means real UI painted,
# not just that the process launched.
#
# It also opens the admin console from the About tab. That guards a native-only
# regression the web/Playwright suite can't see: the admin link must resolve to
# the static /admin/native page, never the server-only /admin route (which has
# no file in the static bundle, so a full navigation white-screens in the
# WebView). The choice is build-time (__CAPACITOR__) precisely so it can't drift
# back to a runtime check that fails before window.Capacitor is injected.
#
# Self-contained runs (boot device, build, install, test, tear down):
#   npm run test:android    # headless Android emulator
#   npm run test:ios        # iOS simulator (macOS-only)
# Or ad-hoc against an app already installed on a running emulator/simulator:
#   npm run test:android:device
appId: art.splotch.app
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: 'Parent Center'
    timeout: 30000
- takeScreenshot: .maestro/screenshots/smoke-launch

# Open Parent Center → About, reveal the hidden admin link (5 taps on the
# version, which sits in the footer below the fold — scroll to it first), follow
# it, and confirm the admin console actually painted. The "Manage AI access
# codes" subtitle renders offline (it's above the login form), so this needs no
# network — only that /admin/native loaded and rendered instead of a blank.
- tapOn: 'Parent Center'
# Navigate to the About tab (Settings → AI → Setup → About). In the iOS WKWebView
# a tap on the tab button doesn't register as a click, and the app's programmatic
# tab nav (scrollTo on the scroll-snap-x pager, TabPager.svelte) is a no-op there
# too — so drive the manual horizontal swipe the tab pager is built around.
# scroll-snap-stop:always advances at most one panel per swipe and the scroller
# clamps at the last panel, so a few left swipes land on About and any extra are
# harmless no-ops. assertVisible (About-only, above-the-fold tagline) then both
# waits for the snap to settle and proves we landed on the right tab.
- repeat:
    times: 5
    commands:
      - swipe:
          start: 85%, 45%
          end: 15%, 45%
          duration: 400
- assertVisible: 'A joyful.*'
- takeScreenshot: .maestro/screenshots/smoke-about

# The version-unlock button lives in the About footer, below the fold inside the
# dialog's vertical scroller. Maestro's built-in scrollUntilVisible swipe gets
# swallowed by the horizontal scroll-snap tab pager in the iOS WKWebView (it
# works on Android) — so pan the dialog with explicit, purely-vertical swipes
# (constant x, so the pager can't read them as a sideways tab change). A small
# fixed count reaches the short footer and is a no-op once scrolled to the
# bottom; assertVisible then fails fast with a clear error if it didn't.
- repeat:
    times: 6
    commands:
      - swipe:
          start: 50%, 75%
          end: 50%, 35%
          duration: 600
- assertVisible: 'Version.*'
- repeat:
    times: 5
    commands:
      - tapOn:
          text: 'Version.*'
# Revealing the link adds a line to the footer; a couple more vertical swipes
# guarantee the Admin link is on-screen before tapping it.
- repeat:
    times: 2
    commands:
      - swipe:
          start: 50%, 75%
          end: 50%, 35%
          duration: 600
- tapOn: 'Admin'
- extendedWaitUntil:
    visible: 'Manage AI access codes'
    timeout: 15000
- takeScreenshot: .maestro/screenshots/smoke-admin

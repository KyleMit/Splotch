<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Splotch coloring-book proof sheets</title>
    <style>
      /* Kept in sync by eye with the shared artifact chrome
         (scripts/lib/artifact-chrome.mjs) — this hand-authored hub can't import it. */
      :root {
        color-scheme: light dark;
        --fg: #23212a;
        --muted: #6b6774;
        --faint: #948f9c;
        --bg: #f5f3ee;
        --bar: #f6f3ec;
        --line: #e6e1d8;
        --accent: #2f6fed;
        --accent-ink: #1e50c4;
        --tab-bg: #efeae1;
        --tab-fg: #4a4650;
        --c-red: #ec534e;
        --c-orange: #f89c45;
        --c-yellow: #f9d24f;
        --c-green: #8cc864;
        --c-blue: #62a2e9;
        --c-purple: #ab71e1;
        --c-pink: #f47cb0;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --fg: #e9e7e2;
          --muted: #a8a4af;
          --faint: #807d89;
          --bg: #131418;
          --bar: #181a20;
          --line: #34373f;
          --accent: #7aa8ff;
          --accent-ink: #a9c6ff;
          --tab-bg: #24262d;
          --tab-fg: #c4c8d0;
        }
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        background: var(--bg);
        color: var(--fg);
        font: 16px/1.5 ui-rounded, "SF Pro Rounded", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      header {
        flex: 0 0 auto;
        background: var(--bar);
        border-bottom: 1px solid var(--line);
        box-shadow: 0 1px 0 rgba(20, 18, 26, 0.06), 0 6px 16px rgba(20, 18, 26, 0.05);
      }
      .titlebar {
        display: flex;
        align-items: center;
        gap: .55rem;
        padding: .6rem 1rem .55rem;
        flex-wrap: wrap;
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: .5rem;
        color: var(--fg);
        font-weight: 700;
        font-size: .92rem;
        letter-spacing: -.01em;
        text-decoration: none;
      }
      .brand:hover { color: var(--accent-ink); }
      .brand .sub { color: var(--muted); font-weight: 600; }
      .crayons { display: inline-flex; gap: 4px; }
      .crayons span {
        width: 16px;
        height: 6px;
        border-radius: 99px;
        display: inline-block;
      }
      .crumbs { margin-left: auto; display: flex; align-items: center; gap: 2px; font-size: .82rem; color: var(--muted); }
      .crumbs a { color: var(--muted); text-decoration: none; }
      .crumbs a:hover { color: var(--accent-ink); }
      .crumbs .sep { color: var(--faint); margin: 0 5px; }
      .crumbs .here { color: var(--fg); font-weight: 650; }
      .count { color: var(--muted); font-size: .78rem; white-space: nowrap; }
      nav {
        display: flex;
        align-items: center;
        gap: .4rem;
        padding: 0 .6rem .6rem;
      }
      .tabs {
        display: flex;
        gap: .4rem;
        overflow-x: auto;
        scrollbar-width: thin;
        padding: .15rem;
        flex: 1 1 auto;
      }
      .tabs button {
        flex: 0 0 auto;
        border: 1px solid transparent;
        background: var(--tab-bg);
        color: var(--tab-fg);
        font: inherit;
        font-size: .9rem;
        font-weight: 600;
        padding: .35rem .8rem;
        border-radius: 999px;
        cursor: pointer;
        white-space: nowrap;
        transition: background .12s, color .12s, border-color .12s;
      }
      .tabs button:hover { border-color: var(--accent); }
      .tabs button.on {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .nudge {
        flex: 0 0 auto;
        width: 2rem;
        height: 2rem;
        border: 1px solid var(--line);
        background: var(--bg);
        color: var(--fg);
        border-radius: 50%;
        cursor: pointer;
        font-size: 1.1rem;
        line-height: 1;
        display: grid;
        place-items: center;
      }
      .nudge:hover { border-color: var(--accent); color: var(--accent); }
      main { flex: 1 1 auto; min-height: 0; }
      iframe { width: 100%; height: 100%; border: 0; display: block; background: var(--bg); }
      .kbd-hint { color: var(--muted); font-size: .78rem; padding: 0 1rem; }
      @media (max-width: 560px) {
        .count { display: none; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="titlebar">
        <a class="brand" href="../index.html">
          <span class="crayons">
            <span style="background: var(--c-red)"></span>
            <span style="background: var(--c-orange)"></span>
            <span style="background: var(--c-yellow)"></span>
            <span style="background: var(--c-green)"></span>
            <span style="background: var(--c-blue)"></span>
            <span style="background: var(--c-purple)"></span>
            <span style="background: var(--c-pink)"></span>
          </span>
          <span>Splotch <span class="sub">/ Artifacts</span></span>
        </a>
        <nav class="crumbs" aria-label="Breadcrumb">
          <a href="../index.html">Artifacts</a><span class="sep" aria-hidden="true">/</span><span class="here">Coloring-book proof sheets</span>
        </nav>
      </div>
      <nav class="tabsrow">
        <button class="nudge" id="prev" title="Previous category (←)" aria-label="Previous category">&#8592;</button>
        <div class="tabs" id="tabs"></div>
        <button class="nudge" id="next" title="Next category (→)" aria-label="Next category">&#8594;</button>
        <span class="count" id="count"></span>
      </nav>
    </header>
    <main>
      <iframe id="sheet" title="Category proof sheet"></iframe>
    </main>
    <script>
      // Each category ships as a sibling proof-sheet HTML in this folder
      // (built by tools/asset-gen/bin/gen-coloring-book-proof-sheet.mjs). This hub
      // just swaps the iframe and keeps the URL hash in sync for deep links.
      var CATEGORIES = [
        { id: 'farm', name: 'Farm', pages: 6 },
        { id: 'dinosaur', name: 'Dinosaurs', pages: 6 },
        { id: 'creatures', name: 'Creatures', pages: 6 },
        { id: 'nature', name: 'Nature', pages: 6 },
        { id: 'objects', name: 'Objects', pages: 5 },
        { id: 'shapes', name: 'Shapes', pages: 5 },
        { id: 'space', name: 'Space', pages: 6 },
        { id: 'vehicles', name: 'Vehicles', pages: 6 },
      ];

      var tabsEl = document.getElementById('tabs');
      var frame = document.getElementById('sheet');
      var countEl = document.getElementById('count');
      var buttons = {};
      var current = -1;

      CATEGORIES.forEach(function (cat, i) {
        var b = document.createElement('button');
        b.textContent = cat.name;
        b.dataset.id = cat.id;
        b.addEventListener('click', function () { show(i); });
        tabsEl.appendChild(b);
        buttons[cat.id] = b;
      });

      function indexFromHash() {
        var id = (location.hash || '').replace(/^#/, '');
        var i = CATEGORIES.findIndex(function (c) { return c.id === id; });
        return i === -1 ? 0 : i;
      }

      function show(i, skipHash) {
        i = (i + CATEGORIES.length) % CATEGORIES.length;
        if (i === current) return;
        current = i;
        var cat = CATEGORIES[i];
        frame.src = cat.id + '.html';
        countEl.textContent = 'Category ' + (i + 1) + ' of ' + CATEGORIES.length + ' · ' + cat.pages + ' pages';
        Object.keys(buttons).forEach(function (id) {
          buttons[id].classList.toggle('on', id === cat.id);
        });
        buttons[cat.id].scrollIntoView({ block: 'nearest', inline: 'center' });
        if (!skipHash) {
          if (location.hash.replace(/^#/, '') !== cat.id) location.hash = cat.id;
          document.title = 'Splotch proof sheets — ' + cat.name;
        }
      }

      document.getElementById('prev').addEventListener('click', function () { show(current - 1); });
      document.getElementById('next').addEventListener('click', function () { show(current + 1); });

      window.addEventListener('keydown', function (e) {
        if (e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
        if (e.key === 'ArrowLeft') { show(current - 1); }
        else if (e.key === 'ArrowRight') { show(current + 1); }
      });

      window.addEventListener('hashchange', function () { show(indexFromHash(), true); });

      show(indexFromHash());
    </script>
  </body>
</html>

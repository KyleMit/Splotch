<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Splotch coloring-book proof sheets</title>
    <style>
      :root {
        color-scheme: light dark;
        --fg: #1a1a1a;
        --muted: #6a6a6a;
        --bg: #fff;
        --bar: #faf7f2;
        --line: #e6e2da;
        --accent: #0b5fff;
        --tab-bg: #f0ece4;
        --tab-fg: #4a4a4a;
        --c-red: #ff5a5a;
        --c-orange: #ff9a3d;
        --c-yellow: #ffd23d;
        --c-green: #52c26b;
        --c-blue: #4d8dff;
        --c-purple: #a06bff;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --fg: #e8e8e8;
          --muted: #9a9a9a;
          --bg: #16171a;
          --bar: #1d1f24;
          --line: #33363d;
          --accent: #6ea8ff;
          --tab-bg: #262932;
          --tab-fg: #c4c8d0;
        }
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        background: var(--bg);
        color: var(--fg);
        font: 16px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      header {
        flex: 0 0 auto;
        background: var(--bar);
        border-bottom: 1px solid var(--line);
      }
      .titlebar {
        display: flex;
        align-items: center;
        gap: .75rem;
        padding: .55rem 1rem .5rem;
      }
      .crayons { display: inline-flex; gap: 3px; }
      .crayons span {
        width: 9px;
        height: 20px;
        border-radius: 3px;
        display: inline-block;
      }
      h1 { font-size: 1.05rem; margin: 0; font-weight: 700; }
      .count { color: var(--muted); font-size: .8rem; margin-left: auto; white-space: nowrap; }
      nav {
        display: flex;
        align-items: center;
        gap: .4rem;
        padding: 0 .6rem .6rem;
      }
      .tabs {
        display: flex;
        gap: .4rem;
        overflow-x: auto;
        scrollbar-width: thin;
        padding: .15rem;
        flex: 1 1 auto;
      }
      .tabs button {
        flex: 0 0 auto;
        border: 1px solid transparent;
        background: var(--tab-bg);
        color: var(--tab-fg);
        font: inherit;
        font-size: .9rem;
        font-weight: 600;
        padding: .35rem .8rem;
        border-radius: 999px;
        cursor: pointer;
        white-space: nowrap;
        transition: background .12s, color .12s, border-color .12s;
      }
      .tabs button:hover { border-color: var(--accent); }
      .tabs button.on {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .nudge {
        flex: 0 0 auto;
        width: 2rem;
        height: 2rem;
        border: 1px solid var(--line);
        background: var(--bg);
        color: var(--fg);
        border-radius: 50%;
        cursor: pointer;
        font-size: 1.1rem;
        line-height: 1;
        display: grid;
        place-items: center;
      }
      .nudge:hover { border-color: var(--accent); color: var(--accent); }
      main { flex: 1 1 auto; min-height: 0; }
      iframe { width: 100%; height: 100%; border: 0; display: block; background: var(--bg); }
      .kbd-hint { color: var(--muted); font-size: .78rem; padding: 0 1rem; }
      @media (max-width: 560px) {
        .count { display: none; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="titlebar">
        <span class="crayons">
          <span style="background: var(--c-red)"></span>
          <span style="background: var(--c-orange)"></span>
          <span style="background: var(--c-yellow)"></span>
          <span style="background: var(--c-green)"></span>
          <span style="background: var(--c-blue)"></span>
          <span style="background: var(--c-purple)"></span>
        </span>
        <h1>Coloring-book proof sheets</h1>
        <span class="count" id="count"></span>
      </div>
      <nav>
        <button class="nudge" id="prev" title="Previous category (←)" aria-label="Previous category">&#8592;</button>
        <div class="tabs" id="tabs"></div>
        <button class="nudge" id="next" title="Next category (→)" aria-label="Next category">&#8594;</button>
      </nav>
    </header>
    <main>
      <iframe id="sheet" title="Category proof sheet"></iframe>
    </main>
    <script>
      // Each category ships as a sibling proof-sheet HTML in this folder
      // (built by tools/asset-gen/bin/gen-coloring-book-proof-sheet.mjs). This hub
      // just swaps the iframe and keeps the URL hash in sync for deep links.
      var CATEGORIES = [
        { id: 'farm', name: 'Farm', pages: 6 },
        { id: 'dinosaur', name: 'Dinosaurs', pages: 6 },
        { id: 'creatures', name: 'Creatures', pages: 6 },
        { id: 'nature', name: 'Nature', pages: 6 },
        { id: 'objects', name: 'Objects', pages: 5 },
        { id: 'shapes', name: 'Shapes', pages: 5 },
        { id: 'space', name: 'Space', pages: 6 },
        { id: 'vehicles', name: 'Vehicles', pages: 6 },
      ];

      var tabsEl = document.getElementById('tabs');
      var frame = document.getElementById('sheet');
      var countEl = document.getElementById('count');
      var buttons = {};
      var current = -1;

      CATEGORIES.forEach(function (cat, i) {
        var b = document.createElement('button');
        b.textContent = cat.name;
        b.dataset.id = cat.id;
        b.addEventListener('click', function () { show(i); });
        tabsEl.appendChild(b);
        buttons[cat.id] = b;
      });

      function indexFromHash() {
        var id = (location.hash || '').replace(/^#/, '');
        var i = CATEGORIES.findIndex(function (c) { return c.id === id; });
        return i === -1 ? 0 : i;
      }

      function show(i, skipHash) {
        i = (i + CATEGORIES.length) % CATEGORIES.length;
        if (i === current) return;
        current = i;
        var cat = CATEGORIES[i];
        frame.src = cat.id + '.html';
        countEl.textContent = 'Category ' + (i + 1) + ' of ' + CATEGORIES.length + ' · ' + cat.pages + ' pages';
        Object.keys(buttons).forEach(function (id) {
          buttons[id].classList.toggle('on', id === cat.id);
        });
        buttons[cat.id].scrollIntoView({ block: 'nearest', inline: 'center' });
        if (!skipHash) {
          if (location.hash.replace(/^#/, '') !== cat.id) location.hash = cat.id;
          document.title = 'Splotch proof sheets — ' + cat.name;
        }
      }

      document.getElementById('prev').addEventListener('click', function () { show(current - 1); });
      document.getElementById('next').addEventListener('click', function () { show(current + 1); });

      window.addEventListener('keydown', function (e) {
        if (e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
        if (e.key === 'ArrowLeft') { show(current - 1); }
        else if (e.key === 'ArrowRight') { show(current + 1); }
      });

      window.addEventListener('hashchange', function () { show(indexFromHash(), true); });

      show(indexFromHash());
    </script>
  </body>
</html>

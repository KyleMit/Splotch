# Production deploy config — the Netlify site builds from the repo ROOT (base directory = root,
# the default), because package.json + the lockfile live here so `npm ci` works. The SvelteKit
# app lives in web/ (ADR-0024): `npm run build` runs the build with cwd=web/, so adapter-netlify
# writes its output under web/; scripts/stage-netlify.mjs then copies web/build -> build and
# web/.netlify -> .netlify so Netlify sees the standard "app at root" layout it expects.
#
# Local development uses web/netlify.toml instead (via `npm run dev:netlify`, which runs
# `netlify dev --cwd web`). Keep these two in sync only where it matters — headers live here
# because they apply to the deployed site.
[build]
  # `git fetch --tags` first: Netlify's blobless clone has the full commit graph
  # but does NOT fetch tags, so `git describe` in web/vite.config.ts can't see the
  # release tag and the web version would fall back to major.minor.0+<sha>
  # (ADR-0030). `|| true` so a fetch hiccup never fails the build — the fallback
  # still produces a valid per-commit version.
  command = "git fetch --tags --force || true; npm run build && node scripts/stage-netlify.mjs"
  # Skip the build (exit 0 = skip) when the push touched nothing the web build
  # consumes — docs, ADRs, ruler-generated agent files, scrapbook/, native trees,
  # asset-gen internals. The watched paths are everything the build reads: the
  # app (web/), the build+prebuild scripts (scripts/), gen:releases input
  # (releases/), the toolchain (package.json + lockfile), and this config.
  # A skipped push leaves the previous deploy live, which is correct when
  # nothing user-facing changed (ADR-0070).
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- web scripts releases package.json package-lock.json netlify.toml"
  # Static assets are published straight from web/build (no copy needed). Only the SSR function
  # is relocated: Netlify always looks for it at <base>/.netlify/functions-internal (base = root),
  # but adapter-netlify writes it under web/.netlify, so stage-netlify.mjs copies that one tree up.
  publish = "web/build"

[build.environment]
  # dependencies == what this Netlify build needs; devDependencies == local/CI-only
  # tooling (Playwright, dprint, sharp, eslint, the Capacitor CLIs, ...). The
  # inverted split + --omit=dev halves the install (ADR-0070). GitHub Actions and
  # local dev run a plain `npm ci` and are unaffected.
  NPM_FLAGS = "--omit=dev --no-audit --no-fund"

# Edge deny-rules (issue #347). The site is one catch-all SSR function
# (adapter-netlify emits `config.path = ["/*"]`), so every junk path a scanner
# probes — `/.env`, `/.git/config` — otherwise invokes (and bills) the function
# just to 404. These `[[redirects]]` are user rules in netlify.toml, which
# Netlify evaluates BEFORE the framework's function catch-all, so a matching
# probe short-circuits to the static `deny.html` (served from the CDN, zero
# invocation) with the same 404 the function used to return.
#
# Deliberately narrow: only unambiguous credential/VCS dotfile probes. Do NOT
# blanket-block `*.json` — the app serves `/version.json` and the webmanifest.
[[redirects]]
  from = "/.env*"
  to = "/deny.html"
  status = 404

[[redirects]]
  from = "/.git"
  to = "/deny.html"
  status = 404

[[redirects]]
  from = "/.git/*"
  to = "/deny.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    # Strict-Transport-Security: splotch.art is served exclusively over HTTPS by
    # Netlify (automatic certs + HTTP->HTTPS redirect), and the only relevant
    # hostname is the apex itself (the /api the browser calls is same-origin), so
    # pinning HTTPS is safe. No `preload` — that hardcodes the domain into browser
    # binaries and is effectively irreversible; includeSubDomains is safe because
    # there is no non-HTTPS *.splotch.art host.
    Strict-Transport-Security = "max-age=63072000; includeSubDomains"
    # Permissions-Policy (enforced): the drawing app uses none of these powerful
    # features, so deny them outright to shrink the attack surface. fullscreen and
    # autoplay are deliberately NOT listed — the canvas calls requestFullscreen()
    # and drawing plays audio, and both default to `self`.
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    # Reporting-Endpoints names the endpoint the CSP's report-to directive routes
    # to (Chromium's Reporting API; report-uri below covers Firefox/Safari). The
    # relative URL resolves against the response URL per the Reporting API spec,
    # so previews report to themselves and production to splotch.art. Both point
    # at the first-party /api/csp-report receiver (no third-party telemetry by
    # design) — violations land as [csp-report] lines in the function log.
    Reporting-Endpoints = 'csp="/api/csp-report"'
    # Content-Security-Policy — ENFORCING (issue #457; staged as report-only by
    # issue #235, flipped after a full Playwright sweep of every surface — draw/
    # undo/clear, coloring book, screenshot save, AI dialog, parent center,
    # /admin, /privacy, SW registration + repeat visit — against this exact
    # policy came back violation-free). 'unsafe-inline' covers what nonces don't
    # yet replace: SvelteKit's inline hydration boot code, the app.html
    # pre-hydration state stamp, and every component-scoped stylesheet inlined
    # into <head> (svelte.config.js inlineStyleThreshold: Infinity). img-src
    # blob:/data: is the AI/screenshot object-URL previews; connect-src 'self'
    # is the same-origin /api/* calls; fonts are the self-hosted Quicksand.
    # frame-ancestors 'none' is the modern twin of the X-Frame-Options above.
    # SCOPE: Netlify custom headers attach only to CDN/static responses — the
    # prerendered pages (/, /privacy, /admin/native) get these headers from
    # here. Function-served SSR responses (/admin) don't, so
    # web/src/hooks.server.ts stamps the same set — sourced once from
    # web/src/lib/server/securityHeaders.ts — onto them so /admin matches
    # (issue #470). securityHeaders.test.ts parses this block and asserts the
    # two copies agree, so keep the header values here in sync with that module.
    Content-Security-Policy = """\
      default-src 'self'; \
      script-src 'self' 'unsafe-inline'; \
      style-src 'self' 'unsafe-inline'; \
      img-src 'self' blob: data:; \
      font-src 'self'; \
      connect-src 'self'; \
      worker-src 'self'; \
      manifest-src 'self'; \
      base-uri 'self'; \
      form-action 'self'; \
      frame-ancestors 'none'; \
      object-src 'none'; \
      report-uri /api/csp-report; \
      report-to csp\
      """

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

# No rule needed for /_app/immutable/* (hashed JS/CSS/fonts/assets): adapter-netlify
# appends `/_app/immutable/*` -> `public, immutable, max-age=31536000` to the _headers
# file it writes into the publish dir, and the deployed woff2/js under that path serve
# with that header (verified 2026-07-22, issue #459). The two rules below cover hashed
# output OUTSIDE /_app: today that's the root-level workbox-<hash>.js emitted by
# vite-plugin-pwa. Rule order matters — a later matching rule's Cache-Control replaces
# an earlier one's, which is how the /sw.js no-cache rule below beats /*.js.
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sounds/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/version.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

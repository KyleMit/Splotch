<!DOCTYPE html>
<html lang="en">
<head>
  {{> head-meta}}
</head>
<body>
  <div class="app-container">
    <!-- Color Palette (Prioritized Order) -->
    <div class="color-palette">
      <button class="color-swatch active" data-color="#AB71E1" style="background-color: #AB71E1;" aria-label="Purple"></button>
      <button class="color-swatch" data-color="#62A2E9" style="background-color: #62A2E9;" aria-label="Blue"></button>
      <button class="color-swatch" data-color="#8CC864" style="background-color: #8CC864;" aria-label="Green"></button>
      <button class="color-swatch" data-color="#F9D24F" style="background-color: #F9D24F;" aria-label="Yellow"></button>
      <button class="color-swatch" data-color="#F89C45" style="background-color: #F89C45;" aria-label="Orange"></button>
      <button class="color-swatch" data-color="#EC534E" style="background-color: #EC534E;" aria-label="Red"></button>
      <button class="color-swatch" data-color="#0a0b10" style="background-color: #0a0b10;" aria-label="Black"></button>
      <button class="color-swatch gradient-swatch" data-color="custom" aria-label="Custom Color"></button>
    </div>

    <!-- Drawing Canvas -->
    <div class="canvas-container">
      <canvas id="drawingCanvas" tabindex="0"></canvas>
    </div>
  </div>

  <!-- Clear Button Container (overlay + button move together) -->
  <div class="clear-container" id="clearContainer">
    <!-- White overlay with torn edge at bottom -->
    <div class="clear-overlay" id="clearOverlay">
      <div class="clear-overlay-inner"></div>
    </div>

    <!-- Tutorial Popover -->
    <div class="clear-tutorial" id="clearTutorial">
      <img src="/icons/arrow-down.svg" alt="Drag away" class="clear-tutorial-arrow" />
      <div class="clear-tutorial-text">drag away to clear</div>
    </div>

    <!-- Floating Clear Button -->
    <button class="clear-button" id="clearButton" aria-label="Clear drawing">
      <img src="/icons/trash.svg" alt="Clear" class="clear-icon" />
    </button>
  </div>

  <!-- Clear Accept Zone -->
  <div class="clear-accept-zone" id="clearAcceptZone"></div>

  <!-- Actions Panel -->
  <div class="actions-panel">
    <button class="action-button disabled" id="undoButton" aria-label="Undo" disabled>
      <img src="/icons/undo.svg" alt="Undo" class="action-icon" />
    </button>
  </div>

  {{> color-picker-overlay}}

  {{> parent-center}}

  <script type="module" src="/scripts/main.js"></script>
</body>
</html>

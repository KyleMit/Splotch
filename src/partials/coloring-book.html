<!-- Coloring Book Picker -->
<dialog class="coloring-book-modal" id="coloring-book-dialog">
  <div class="coloring-book-content">
    <button class="coloring-book-close" aria-label="Close">&times;</button>

    <div class="coloring-book-view" id="coloringBooksView">
      <h2>Coloring Books</h2>
      <div class="coloring-grid coloring-books-grid" id="coloringBooksGrid"></div>
      <button class="coloring-clear-overlay" id="coloringClearOverlay" hidden>
        Remove current page
      </button>
    </div>

    <div class="coloring-book-view" id="coloringPagesView" hidden>
      <div class="coloring-book-header">
        <button class="coloring-back-button" id="coloringBackButton" aria-label="Back">
          <span aria-hidden="true">‹</span>
        </button>
        <h2 id="coloringPagesTitle">Coloring Pages</h2>
      </div>
      <div class="coloring-grid coloring-pages-grid" id="coloringPagesGrid"></div>
    </div>
  </div>
</dialog>
